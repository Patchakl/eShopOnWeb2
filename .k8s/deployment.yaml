apiVersion: v1
kind: Namespace
metadata:
  name: eshoponweb-patcharaporn

---

apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: eshoponweb-patcharaporn
  name: webapp
  labels:
    app: sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      service: webapp
  template:
    metadata:
      labels:
        app: sample-app
        service: webapp
    spec:
      containers:
        - name: webapp
          image: aistraining.azurecr.io/eshoponweb-patcharaporn:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:80"
            - name: WebApiBaseAddress
              value: "http://webapi"
            - name: BaseUrlConfiguration__WebBase
              value: "http://20.24.181.42"
            - name: BaseUrlConfiguration__ApiBase
              value: "http://webapi"

