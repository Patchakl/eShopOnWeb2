name: Container Workflow
on: workflow_dispatch

env:
  ACR_LOGIN_SERVER: aistraining.azurecr.io
  TAG_NAME: eshoponweb-patcharaporn:1.0.0
  IMAGE_NAME: ${{ vars.ACR_LOGIN_SERVER }}/${{ vars.TAG_NAME }}
  RESOURCE_GROUP: ais-training
  CLUSTER_NAME: aks-demo
  
jobs:
  build-container:
    if: false
    runs-on: ubuntu-latest

    steps:
      - name: Checkput source code
        uses: actions/checkout@v4

      - name: ACR Login
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD}}

      - name: Build and Push Image
        run: |
          docker build -f src/Web/Dockerfile -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.TAG_NAME }} .
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.TAG_NAME }}
  
  deploy-to-aks:
    needs: build-container
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ais-training
          cluster-name: aks-demo

      - name: Deploy to AKS
        uses: Azure/k8s-deploy@v5
        with:
          manifests: |
            ./k8s/deployment.yaml
            ./k8s/service.yaml
          images: |
            aistraining.azurecr.io/eshoponweb-patcharaporn:1.0.0

